<head>

</head>

<body>

<header class="encabezado">
    <h1>💰 Reto Ahorro Fin de Año</h1>
    <p>Construye tu meta peso a peso.</p>
</header>

<main class="contenedor">

    <section class="tarjeta">
        <h2>🎯 Meta</h2>

        <div class="meta">
            <span id="metaTexto">$5.000.000</span>
        </div>

        <button id="btnMeta">
            Cambiar meta
        </button>
    </section>


    <section class="tarjeta resumen">

        <div class="dato">
            <h3>Ahorrado</h3>
            <p id="ahorrado">$0</p>
        </div>

        <div class="dato">
            <h3>Restante</h3>
            <p id="restante">$5.000.000</p>
        </div>

        <div class="progreso">

            <div class="barra">
                <div id="barraProgreso"></div>
            </div>

            <p id="porcentaje">
                0%
            </p>

        </div>

    </section>


    <section class="tarjeta">

        <h2>📅 Calendario de ahorro</h2>

        <div id="calendario" class="calendario">

        </div>

    </section>


    <section class="tarjeta">

        <h2>📊 Estadísticas</h2>

        <div class="estadisticas">

            <div>
                <strong>Días registrados</strong>
                <p id="dias">0 / 365</p>
            </div>

            <div>
                <strong>Promedio diario</strong>
                <p id="promedio">$0</p>
            </div>

        </div>

    </section>

</main>
